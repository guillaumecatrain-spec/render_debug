<!DOCTYPE html>
<html lang='fr'>
<head>
<meta charset='UTF-8'>
<title>Stormglass Render Debug</title>
</head>
<body>
<h1>Stormglass Debug (Render)</h1>
<div id='debug'>Chargement…</div>
<script>
async function test(){
 let out = "=== TEST STORMGLASS (via Render API) ===
";
 try{
   const r = await fetch('/stormglass');
   out += 'Status HTTP: '+r.status+'
';
   const txt = await r.text();
   out += 'Réponse brute:
'+txt+'
';
 }catch(e){ out+='ERREUR FETCH: '+e; }
 document.getElementById('debug').textContent = out;
}
test();
</script>
</body>
</html>
